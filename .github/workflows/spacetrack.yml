name: Fetch Space-Track Catalog
on:
  schedule:
    - cron: '17 */8 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch full catalog
        env:
          ST_USER: ${{ secrets.SPACETRACK_USER }}
          ST_PASS: ${{ secrets.SPACETRACK_PASS }}
        run: |
          QUERY="https://www.space-track.org/basicspacedata/query/class/gp/decay_date/null-val/epoch/>now-30/orderby/NORAD_CAT_ID/format/json"
          curl -s https://www.space-track.org/ajaxauth/login \
            --data-urlencode "identity=$ST_USER" \
            --data-urlencode "password=$ST_PASS" \
            --data-urlencode "query=$QUERY" \
            -o raw.json
          head -c 1 raw.json | grep -q '\[' || { echo "Fetch failed:"; cat raw.json; exit 1; }

      - name: Convert to catalog.json
        run: |
          jq -c '{generated: now|todate, sats: [.[] |
            [.OBJECT_NAME,
             (.NORAD_CAT_ID|tonumber),
             (if .OBJECT_TYPE=="PAYLOAD" then "P"
              elif .OBJECT_TYPE=="ROCKET BODY" then "R"
              elif .OBJECT_TYPE=="DEBRIS" then "D"
              else "U" end),
             .TLE_LINE1, .TLE_LINE2]]}' raw.json > catalog.json
          rm raw.json

      - name: Commit
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add catalog.json
          git diff --cached --quiet || git commit -m "Catalog update $(date -u +%F_%H:%M)"
          git push
